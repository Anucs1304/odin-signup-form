<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up Form</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">

        <div class="left-panel">
            <div class="logo-bar">
                <img src="images/odin-logo.png" alt="Odin logo">
                <h1>ODIN</h1>
            </div>

            <div class="photo-credit">
                Phot by Halie West on Unplash
            </div>
        </div>

        <div class="right-panel">
            <div class="intro">
                <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up now to get started.
                    <br><br>
                    You know you want to.
                </p>
            </div>

            <form class="signup-form">

                <h2>Let's do this!</h2>

                <div class="form-row">
                    <label for="first-name">FIRST NAME</label>
                    <input type="text" id="first-name" required>
                </div>

                <div class="form-row">
                    <label for="last-name">LAST NAME</label>
                    <input type="text" id="last-name" required>
                </div>

                <div class="form-row">
                    <label for="email">EMAIL</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-row">
                    <label for="phone">PHONE NUMBER</label>
                    <input type="tel" id="phone">
                </div>

                <div class="form-row">
                    <lable for="password">PASSWORD</lable>
                    <input type="password" id="password" required>
                </div>

                <div class="form-row">
                    <label for="confirm-password">CONFIRM PASSWORD</label>
                    <input type="password" id="confirm-password" required>
                </div>

                <button type="submit">Create Account</button>
            </form>

            <p class="login-text">Already have an account? <a href="#">Log in</a></p>
        </div>
    </div>
</body>
</html>
